# SlimEmail Agent API — thêm vào server block Nginx của user.slimemail.vn
# (Apache dùng rule trong .htaccess / htaccess-them-vao-root.txt)
#
# Sau khi reload nginx, test:
#   curl -H "Authorization: Bearer YOUR_KEY" https://user.slimemail.vn/api/agent/me
# Kỳ vọng: 200 JSON (hoặc 401 nếu sai key) — KHÔNG phải 404 HTML nginx

location ^~ /api/agent {
    rewrite ^/api/agent/?(.*)$ /api/agent/index.php?route=$1 last;
}

# Nếu site đã có block PHP-FPM chung, đảm bảo index.php vẫn được xử lý:
